body{background:#f4f5f7;padding:15px;max-width:500px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:15px;margin-bottom:12px}
h3{margin-bottom:10px;font-size:16px}
input,select,textarea,button{
  width:100%;padding:10px 12px;border:1px solid #ddd;
  border-radius:8px;margin-bottom:8px;font-size:14px
}
select[multiple] {
  height: auto;
  min-height: 120px;
}
button{
  background:#007aff;color:#fff;
  border:none;font-size:15px
}
#result{margin-top:10px}
.item{
  padding:12px;border-left:4px solid #007aff;background:#fff;
  border-radius:8px;margin-bottom:8px
}
.name{font-weight:bold;margin-bottom:6px}
.nums{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.tag{
  background:#007aff;color:#fff;padding:4px 8px;
  border-radius:6px;font-size:12px
}
.remark{font-size:12px;color:#666}
.empty{color:#999;text-align:center;padding:10px}
.search-row{display:flex;gap:8px}
.search-row input{flex:1;margin-bottom:0}
.search-row button{width:auto;margin-bottom:0}
</style>

    <button onclick="search()">搜索</button>
  </div>

  </select>
  
  <input id="color" value="#007aff" placeholder="颜色">
  <textarea id="remark" rows="2" placeholder="备注"></textarea>
  <button onclick="add()">保存</button>
</div>

<div id="result"></div>

<script>
function load(){
  let d = localStorage.getItem('mydata')
  return d ? JSON.parse(d) : []
}
function save(data){
  localStorage.setItem('mydata', JSON.stringify(data))
}

function add(){
  let name = document.getElementById('name').value.trim()
  let numSelect = document.getElementById('numSelect')
  let selectedOptions = Array.from(numSelect.selectedOptions)
  let nums = selectedOptions.map(opt => opt.value).filter(Boolean).join(',')
  let color = document.getElementById('color').value.trim()
  let remark = document.getElementById('remark').value.trim()
  
  if(!name || !nums){
    alert('请填写姓名并选择编号')
    return
  }
  
  let arr = load()
  arr.push({name, nums, color, remark})
  save(arr)
  
  document.getElementById('name').value = ''
  numSelect.selectedIndex = -1
  document.getElementById('remark').value = ''
  
  showAll()
}

function showAll(){
  let arr = load()
  renderList(arr)
}

function search(){
  let key = document.getElementById('search').value.trim()
  if(!key){
    showAll()
    return
  }
  let arr = load()
  let result = arr.filter(item => item.name.includes(key))
  renderList(result)
}

function renderList(list){
  let box = document.getElementById('result')
  if(list.length === 0){
    box.innerHTML = '<div class="empty">暂无记录</div>'
    return
  }
  let html = ''
  list.forEach(item => {
    html += `
    <div class="item" style="border-left-color:${item.color}">
      <div class="name">${item.name}</div>
      <div class="nums">`
    let numArr = item.nums.split(',')
    numArr.forEach(n => {
      html += `<span class="tag" style="background:${item.color}">${n}</span>`
    })
    html += `
      </div>
      <div class="remark">${item.remark ? '备注：'+item.remark : ''}</div>
    </div>`
  })
  box.innerHTML = html
}

window.onload = showAll
</script>
